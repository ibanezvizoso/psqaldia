<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoEPP | PSQALDÍA</title>
    <meta name="description" content="Generador dinámico de Exploración Psicopatológica (EPP) para psiquiatría y psicología.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4338ca;
            --primary-dark: #3730a3;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }

        /* Navbar Simplificada (Igual que catatonia.html) */
        nav {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: center; /* Centrado para mayor limpieza */
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--primary); }

        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

        /* Header */
        .hero { text-align: center; margin-bottom: 2.5rem; }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--text); }
        .hero p { color: var(--text-light); font-size: 1rem; max-width: 600px; margin: 0 auto; }

        /* Contenedor de la Herramienta - Sin desbordes */
        #tool-wrapper {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            overflow: visible; /* Permitir que el contenido respire */
            margin-bottom: 2rem;
        }

        /* Estilo para el botón de volver */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            padding: 10px 20px;
            border-radius: 10px;
            background: var(--white);
            border: 1px solid var(--border);
        }
        .back-link:hover { color: var(--primary); border-color: var(--primary); }

        footer { text-align: center; padding: 2rem 1rem 4rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">PSQ<span>ALDÍA</span></a>
    </nav>

    <div class="container">
        <header class="hero">
            <h1>AutoEPP</h1>
            <p>Generador dinámico de Exploración Psicopatológica con lógica condicional avanzada.</p>
        </header>

        <div id="tool-wrapper">
            <div id="modalData">
                <div style="padding:4rem; text-align:center;">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--primary);"></i>
                    <p style="margin-top:1rem; font-weight:600;">Sincronizando con base de datos...</p>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 1rem;">
            <a href="/herramientas" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver a herramientas
            </a>
        </div>
    </div>

    <footer>
        <p style="color:var(--text-light); font-size:0.8rem;">PSQALDÍA © 2026 - Herramienta de apoyo clínico</p>
    </footer>

    <script>window.WORKER_URL = "https://psqaldia.com/";</script>
    <script src="autoepp.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof iniciarAutoEPP === 'function') iniciarAutoEPP();
        });
    </script>
</body>
</html>
