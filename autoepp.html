<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoEPP | PSQ al día</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4338ca;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Cabecera Estándar PSQ al día (Copiada de tu index) */
        header {
            background: white;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo-container {
            display: inline-block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: -0.025em;
        }

        .logo-text span {
            color: var(--primary-color);
        }

        /* Contenedor de la Herramienta */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tool-header {
            margin-bottom: 2rem;
            text-align: left;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }

        .back-button:hover {
            color: var(--primary-color);
        }

        #tool-wrapper {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            /* Importante: eliminamos overflow hidden aquí */
        }

        footer {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .logo-text { font-size: 1.5rem; }
            .container { margin: 1rem auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="/" class="logo-text">PSQ<span>al día</span></a>
        </div>
    </header>

    <div class="container">
        <div class="tool-header">
            <a href="/herramientas" class="back-button"><i class="fas fa-arrow-left"></i> Volver a herramientas</a>
            <h1 style="font-size: 2rem; font-weight: 800;">AutoEPP</h1>
            <p style="color: var(--text-muted);">Generador inteligente de Exploración Psicopatológica.</p>
        </div>

        <div id="tool-wrapper">
            <div id="modalData">
                <div style="padding:4rem; text-align:center;">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--primary-color);"></i>
                    <p style="margin-top:1rem; font-weight:600;">Sincronizando con base de datos...</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>PSQ al día © 2026</p>
    </footer>

    <script>window.WORKER_URL = "https://psqaldia.com/";</script>
    <script src="autoepp.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof iniciarAutoEPP === 'function') iniciarAutoEPP();
        });
    </script>
</body>
</html>
