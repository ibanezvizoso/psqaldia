<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio SERGAS</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e293b; color: #f8fafc; font-size: 16px; }
        button { background: #22c55e; color: white; border: none; padding: 15px 20px; font-size: 18px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        #log { margin-top: 20px; background: #0f172a; padding: 20px; border-radius: 8px; line-height: 1.8; }
        .ok { color: #4ade80; }
        .error { color: #f87171; }
        .warning { color: #facc15; }
    </style>
</head>
<body>
    <h2>Diagnóstico de Red PSQALDÍA</h2>
    <p>Esta prueba aísla cada capa de la aplicación para ver dónde corta el firewall.</p>
    <button onclick="iniciar()">▶ INICIAR TEST</button>
    <div id="log">Esperando para iniciar...</div>

    <script>
        function log(msg, tipo = '') { 
            const div = document.getElementById('log');
            div.innerHTML += `<div class="${tipo}">${msg}</div>`;
        }

        async function test(nombre, url) {
            log(`⏳ Probando: ${nombre} (${url})...`, 'warning');
            const start = Date.now();
            try {
                // Añadimos un timestamp para evitar cachés del navegador
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'nocache=' + start);
                const time = Date.now() - start;
                if (res.ok) {
                    log(`✅ ÉXITO: ${time} ms`, 'ok');
                } else {
                    log(`❌ ERROR HTTP: ${res.status} en ${time} ms`, 'error');
                }
            } catch(e) {
                const time = Date.now() - start;
                log(`❌ BLOQUEO TOTAL: Falló en ${time} ms. Razón: ${e.message}`, 'error');
            }
            log('-----------------------------------');
        }

        async function iniciar() {
            document.getElementById('log').innerHTML = '';
            
            // 1. Probamos un archivo estático puro (Si esto falla, el SERGAS bloquea Cloudflare Pages)
            await test('1. Archivo Estático', '/manifest.json');
            
            // 2. Probamos una herramienta HTML (Si esto falla, bloquean subrutas)
            await test('2. HTML de Herramienta', '/autoepp.html');
            
            // 3. Probamos la API de Datos del Worker (Si esto falla, el SERGAS bloquea las URLs con "?")
            await test('3. Worker API Datos', '/?sheet=Hoja%201');
            
            // 4. Probamos la Home con el modificador de SEO (Si esto falla, el proxy odia el HTMLRewriter)
            await test('4. Raíz (Home)', '/');
            
            log('🏁 PRUEBA FINALIZADA');
        }
    </script>
</body>
</html>
