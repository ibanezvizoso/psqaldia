<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolutivo Alta Voluntaria | PSQALDÍA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .btn-psq { background-color: #2c3e50; color: white; border-radius: 8px; }
        .btn-psq:hover { background-color: #1a252f; color: white; }
        .form-label { font-weight: 600; color: #34495e; }
        .header-psq { background: white; padding: 1rem; border-bottom: 2px solid #eee; margin-bottom: 2rem; }
        #resultadoIA { background-color: #fff9e6; border-left: 5px solid #f1c40f; white-space: pre-wrap; min-height: 450px; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="header-psq shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/" class="text-decoration-none text-dark fw-bold"> <i class="fas fa-arrow-left me-2"></i> PSQALDÍA</a>
        <h5 class="mb-0">Asistente: Evolutivo Alta Voluntaria</h5>
    </div>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-lg-6">
            <div class="card shadow-sm p-4 mb-4">
                <form id="altaForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Paciente (opcional)</label>
                        <input type="text" id="nombrePaciente" class="form-control" placeholder="Nombre completo o iniciales">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Fecha</label>
                            <input type="date" id="fecha" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Hora</label>
                            <input type="time" id="hora" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Género</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="genero" id="genH" value="H" checked onclick="actualizarEPP()">
                                <label class="btn btn-outline-primary" for="genH">H</label>
                                <input type="radio" class="btn-check" name="genero" id="genM" value="M" onclick="actualizarEPP()">
                                <label class="btn btn-outline-danger" for="genM">M</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Motivos aducidos (múltiple):</label>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="mejoría de los síntomas">
                            <label class="form-check-label">Mejoría de los síntomas</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="remisión de ideas de suicidio">
                            <label class="form-check-label">Remisión de ideas de suicidio</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="empeoramiento en contexto de ingreso">
                            <label class="form-check-label">Empeoramiento en contexto de ingreso</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="preferencia por tratamiento ambulatorio">
                            <label class="form-check-label">Preferencia por tratamiento ambulatorio</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="deseo de acompañamiento familiar">
                            <label class="form-check-label">Deseo de acompañamiento familiar</label>
                        </div>
                        <input type="text" id="otrosMotivos" class="form-control form-control-sm mt-2" placeholder="Otros motivos...">
                    </div>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-7">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="checkRiesgos">
                                <label class="form-check-label fw-bold">Se explican riesgos:</label>
                            </div>
                            <textarea id="textoRiesgos" class="form-control" rows="2" placeholder="Recaída, abandono tto..."></textarea>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small">Capacidad/Comprensión:</label>
                            <div class="form-check small">
                                <input class="form-check-input capacidad" type="checkbox" value="no presenta alteraciones cognitivas" checked>
                                <label class="form-check-label">Sin alt. cognitivas</label>
                            </div>
                            <div class="form-check small">
                                <input class="form-check-input capacidad" type="checkbox" value="sin alteraciones psicopatológicas significativas en su capacidad de decisión" checked>
                                <label class="form-check-label">Decisión conservada</label>
                            </div>
                            <div class="form-check small">
                                <input class="form-check-input capacidad" type="checkbox" value="comprende la información recibida" checked>
                                <label class="form-check-label">Comprende información</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            Exploración psicopatológica:
                            <div class="btn-group btn-group-sm">
                                <input type="radio" class="btn-check" name="tipoExp" id="expNormal" checked onclick="setExploracion('default')">
                                <label class="btn btn-outline-secondary" for="expNormal">Por defecto</label>
                                <input type="radio" class="btn-check" name="tipoExp" id="expLibre" onclick="setExploracion('libre')">
                                <label class="btn btn-outline-secondary" for="expLibre">Texto libre</label>
                            </div>
                        </label>
                        <div id="contenedorExploracion" class="d-none mt-2">
                            <textarea id="textoExploracion" class="form-control" rows="5"></textarea>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="checkFamilia" checked>
                        <label class="form-check-label fw-bold">Comunicación familiar (acuerdo).</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Plan al alta (múltiple):</label>
                        <div class="form-check small">
                            <input class="form-check-input check-plan" type="checkbox" value="acudirá a cita programada con psiquiatría en USM de referencia">
                            <label class="form-check-label">Cita programada en USM</label>
                        </div>
                        <div class="form-check small">
                            <input class="form-check-input check-plan" type="checkbox" value="continuará con su tratamiento psicofarmacológico habitual">
                            <label class="form-check-label">Continuar tto. habitual</label>
                        </div>
                        <div class="form-check small">
                            <input class="form-check-input check-plan" type="checkbox" value="en caso de empeoramiento clínico acudirá al servicio de urgencias de referencia">
                            <label class="form-check-label">Urgencias si empeoramiento</label>
                        </div>
                        <div class="mt-2">
                            <label class="form-label small text-muted">Plan adicional / Texto libre:</label>
                            <textarea id="planAltaLibre" class="form-control" rows="2" placeholder="Otras citas, recomendaciones..."></textarea>
                        </div>
                    </div>

                    <button type="button" onclick="redactarEvolutivo()" class="btn btn-psq w-100 p-3 shadow">
                        <i class="fas fa-magic me-2"></i> REDACTAR CON IA
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm p-4 sticky-top" style="top: 20px;">
                <label class="form-label text-primary fw-bold">Propuesta de redacción (HC):</label>
                <div id="resultadoIA" class="form-control p-3 mb-3">Los resultados aparecerán aquí...</div>
                <button class="btn btn-outline-secondary btn-sm" onclick="copyResult()">
                    <i class="fas fa-copy me-1"></i> Copiar al portapapeles
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const EPP_H = "Consciente. Abordable y colaborador. Orientado globalmente. Atento. Lenguaje fluido y espontáneo. Discurso coherente. No alteraciones psicomotrices. No alteraciones en el contenido del pensamiento. No alteraciones sensoperceptivas. Eutímico. No apatía ni anhedonia. No ansiedad patológica. Sueño conservado. Normorexia. No auto ni heteroagresividad. No ideas de suicidio en este momento.";
    const EPP_M = "Consciente. Abordable y colaboradora. Orientada globalmente. Atenta. Lenguaje fluido y espontáneo. Discurso coherente. No alteraciones psicomotrices. No alteraciones en el contenido del pensamiento. No alteraciones sensoperceptivas. Eutímica. No apatía ni anhedonia. No ansiedad patológica. Sueño conservado. Normorexia. No auto ni heteroagresividad. No ideas de suicidio en este momento.";

    window.onload = () => {
        const ahora = new Date();
        document.getElementById('fecha').value = ahora.toISOString().split('T')[0];
        document.getElementById('hora').value = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        actualizarEPP();
    };

    function actualizarEPP() {
        const genero = document.querySelector('input[name="genero"]:checked').value;
        const area = document.getElementById('textoExploracion');
        if (document.getElementById('expNormal').checked) {
            area.value = (genero === 'H') ? EPP_H : EPP_M;
        }
    }

    function setExploracion(tipo) {
        const contenedor = document.getElementById('contenedorExploracion');
        if (tipo === 'default') {
            contenedor.classList.add('d-none');
            actualizarEPP();
        } else {
            contenedor.classList.remove('d-none');
            document.getElementById('textoExploracion').focus();
        }
    }

    async function redactarEvolutivo() {
        const btn = event.currentTarget;
        const resDiv = document.getElementById('resultadoIA');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...';
        
        const datos = {
            nombre: document.getElementById('nombrePaciente').value || "el paciente",
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value,
            genero: document.querySelector('input[name="genero"]:checked').value,
            motivos: Array.from(document.querySelectorAll('.motivo:checked')).map(el => el.value),
            otrosMotivos: document.getElementById('otrosMotivos').value,
            epp: document.getElementById('textoExploracion').value,
            riesgosCheck: document.getElementById('checkRiesgos').checked,
            riesgosTexto: document.getElementById('textoRiesgos').value,
            capacidad: Array.from(document.querySelectorAll('.capacidad:checked')).map(el => el.value),
            familia: document.getElementById('checkFamilia').checked,
            planChecks: Array.from(document.querySelectorAll('.check-plan:checked')).map(el => el.value),
            planLibre: document.getElementById('planAltaLibre').value
        };

        try {
            const response = await fetch('/api/ia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    context: JSON.stringify(datos),
                    prompt: "Redacta una nota evolutiva médica para un alta voluntaria. Formato: Solo párrafos de texto plano, sin encabezados ni negritas. Esquema: Párrafo 1 (Inicio con fecha, hora, nombre y motivos) -> Párrafo 2 (Riesgos explicados y valoración de la capacidad de decisión) -> Párrafo 3 (Escribir exactamente 'Exploración psicopatológica en el momento del alta: ' seguido del texto de la EPP entregado) -> Párrafo 4 (Comunicación familiar y plan de seguimiento al alta)."
                })
            });
            const data = await response.json();
            // Limpieza extra por si la IA pone asteriscos
            resDiv.innerText = data.response.replace(/\*\*/g, '').trim();
        } catch (e) {
            resDiv.innerText = "Error: Verifica la conexión con el Worker y los AI Bindings.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-magic me-2"></i> REDACTAR CON IA';
        }
    }

    function copyResult() {
        const text = document.getElementById('resultadoIA').innerText;
        navigator.clipboard.writeText(text);
        alert('Copiado al portapapeles');
    }
</script>
</body>
</html>
