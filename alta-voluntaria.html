<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolutivo Alta Voluntaria | PSQALDÍA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .btn-psq { background-color: #2c3e50; color: white; border-radius: 8px; }
        .btn-psq:hover { background-color: #1a252f; color: white; }
        .form-label { font-weight: 600; color: #34495e; }
        .header-psq { background: white; padding: 1rem; border-bottom: 2px solid #eee; margin-bottom: 2rem; }
        #resultadoIA { background-color: #fff9e6; border-left: 5px solid #f1c40f; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="header-psq shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/" class="text-decoration-none text-dark fw-bold"> <i class="fas fa-arrow-left me-2"></i> PSQALDÍA</a>
        <h5 class="mb-0">Asistente: Evolutivo Alta Voluntaria</h5>
    </div>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-lg-6">
            <div class="card shadow-sm p-4 mb-4">
                <form id="altaForm">
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Fecha</label>
                            <input type="date" id="fecha" class="form-control">
                        </div>
                        <div class="col">
                            <label class="form-label">Hora</label>
                            <input type="time" id="hora" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Motivos solicitados (múltiple):</label>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="mejoría de los síntomas">
                            <label class="form-check-label">Mejoría de los síntomas</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="remisión de ideas de suicidio">
                            <label class="form-check-label">Remisión de ideas de suicidio</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="empeoramiento en contexto de ingreso">
                            <label class="form-check-label">Empeoramiento en contexto de ingreso</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="preferencia por tratamiento ambulatorio">
                            <label class="form-check-label">Preferencia por tratamiento ambulatorio</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input motivo" type="checkbox" value="deseo de acompañamiento familiar">
                            <label class="form-check-label">Deseo de acompañamiento familiar</label>
                        </div>
                        <div class="mt-2">
                            <input type="text" id="otrosMotivos" class="form-control form-control-sm" placeholder="Otros motivos...">
                        </div>
                    </div>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-7">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="checkRiesgos">
                                <label class="form-check-label fw-bold">Se explican riesgos asociados:</label>
                            </div>
                            <textarea id="textoRiesgos" class="form-control" rows="3" placeholder="Ej: riesgo de recaída, auto/heteroagresividad..."></textarea>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small">Capacidad/Comprensión:</label>
                            <div class="form-check small">
                                <input class="form-check-input capacidad" type="checkbox" value="no presenta alteraciones cognitivas">
                                <label class="form-check-label">Sin alt. cognitivas</label>
                            </div>
                            <div class="form-check small">
                                <input class="form-check-input capacidad" type="checkbox" value="sin alteraciones psicopatológicas significativas en su capacidad de decisión">
                                <label class="form-check-label">Capacidad de decisión conservada</label>
                            </div>
                            <div class="form-check small">
                                <input class="form-check-input capacidad" type="checkbox" value="comprende la información recibida">
                                <label class="form-check-label">Comprende información</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="checkFamilia">
                        <label class="form-check-label fw-bold">Comunicación con familiares, se muestran de acuerdo.</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Plan al alta:</label>
                        <textarea id="planAlta" class="form-control" rows="2" placeholder="Cita en CSM, medicación..."></textarea>
                    </div>

                    <button type="button" onclick="redactarEvolutivo()" class="btn btn-psq w-100 p-3 shadow">
                        <i class="fas fa-magic me-2"></i> REDACTAR EVOLUTIVO CON IA
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm p-4 sticky-top" style="top: 20px;">
                <label class="form-label text-primary"><i class="fas fa-pen-nib me-2"></i> Propuesta de redacción:</label>
                <div id="resultadoIA" class="form-control p-3 mb-3" style="min-height: 400px; font-size: 0.95rem;">
                    Los resultados aparecerán aquí...
                </div>
                <button class="btn btn-outline-secondary btn-sm" onclick="copyResult()">
                    <i class="fas fa-copy me-1"></i> Copiar al portapapeles
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Aquí irá la lógica JS para conectar con el Worker que crearemos luego
    function redactarEvolutivo() {
        const btn = event.target;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...';
        
        // Simulación por ahora (próximo paso: conectar al Worker)
        setTimeout(() => {
            document.getElementById('resultadoIA').innerText = "Aquí aparecerá el texto redactado profesionalmente por la IA de Cloudflare basándose en tus checks...";
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-magic me-2"></i> REDACTAR EVOLUTIVO CON IA';
        }, 1000);
    }

    function copyResult() {
        const text = document.getElementById('resultadoIA').innerText;
        navigator.clipboard.writeText(text);
        alert('Copiado');
    }
</script>
</body>
</html>
