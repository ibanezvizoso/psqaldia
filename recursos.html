<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Recursos | PSQALDÍA</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        
        /* Controles */
        .controls { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            flex-wrap: wrap;
        }
        select { 
            padding: 10px 15px; border-radius: 8px; border: 1px solid #dcdfe6; 
            font-size: 16px; cursor: pointer; background: white; min-width: 250px;
        }

        /* Mapa */
        #map { 
            height: 650px; width: 100%; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e4e7ed;
        }

        /* Popups */
        .popup-content { min-width: 200px; padding: 5px; }
        .popup-content b { font-size: 16px; color: #1a73e8; display: block; margin-bottom: 5px; }
        .popup-content i { color: #5f6368; display: block; margin-bottom: 10px; }
        .btn-web { 
            display: block; text-align: center; margin-top: 10px; padding: 8px; 
            background: #1a73e8; color: white !important; text-decoration: none; 
            border-radius: 6px; font-weight: bold; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📍 Buscador de Recursos Comunitarios</h1>
        
        <div class="controls">
            <label for="areaSelect"><b>Área Sanitaria:</b></label>
            <select id="areaSelect">
                <option value="todas">Cargando datos...</option>
            </select>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicialización del Mapa
        const map = L.map('map').setView([42.2328, -8.7226], 11); // Centrado en Vigo
        const areaSelect = document.getElementById('areaSelect');
        let todosLosRecursos = [];
        let markersLayer = L.layerGroup().addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Carga de datos desde tu Worker
        async function cargarDatos() {
            try {
                // Usamos la URL de tu Worker
                const response = await fetch('https://psqaldia.com/?sheet=Recursos');
                const data = await response.json();
                
                if (!data.values || data.values.length === 0) {
                    areaSelect.innerHTML = '<option>No se encontraron datos</option>';
                    return;
                }

                // MAPEADO SEGÚN TU EXCEL (Imagen de referencia)
                // A=0(Área), B=1(Nombre), C=2(Categoría), D=3(Dirección), E=4(Ciudad), 
                // F=5(CP), G=6(Teléfono), H=7(Web), I=8(Coordenadas)
                todosLosRecursos = data.values.map(row => ({
                    area: row[0],
                    nombre: row[1],
                    categoria: row[2],
                    direccion: `${row[3] || ''}, ${row[4] || ''}`,
                    tel: row[6],
                    web: row[7],
                    coords: row[8] // Columna I
                })).filter(r => r.nombre && r.coords); // Solo recursos válidos

                poblarSelector();
                mostrarMarcadores('todas');
            } catch (error) {
                console.error("Error cargando el Sheet:", error);
                areaSelect.innerHTML = '<option>Error al cargar áreas</option>';
            }
        }

        // 3. Llenar el selector
        function poblarSelector() {
            const areas = [...new Set(todosLosRecursos.map(r => r.area))].filter(Boolean).sort();
            areaSelect.innerHTML = '<option value="todas">🌍 Todas las Áreas</option>';
            
            areas.forEach(area => {
                const opt = document.createElement('option');
                opt.value = area;
                opt.textContent = area;
                areaSelect.appendChild(opt);
            });
        }

        // 4. Dibujar puntos
        function mostrarMarcadores(filtro) {
            markersLayer.clearLayers();
            const filtrados = filtro === 'todas' ? todosLosRecursos : todosLosRecursos.filter(r => r.area === filtro);
            const bounds = [];

            filtrados.forEach(r => {
                const partes = r.coords.split(',');
                if (partes.length === 2) {
                    const lat = parseFloat(partes[0].trim());
                    const lon = parseFloat(partes[1].trim());

                    if (!isNaN(lat) && !isNaN(lon)) {
                        const marker = L.marker([lat, lon]);
                        
                        let popupHtml = `<div class="popup-content">
                            <b>${r.nombre}</b>
                            <i>${r.categoria || ''}</i>
                            ${r.direccion}<br>`;
                        
                        if (r.tel) popupHtml += `📞 <a href="tel:${r.tel}">${r.tel}</a><br>`;
                        if (r.web && r.web.includes('http')) {
                            popupHtml += `<a href="${r.web}" target="_blank" class="btn-web">Ver Web</a>`;
                        }
                        popupHtml += `</div>`;

                        marker.bindPopup(popupHtml);
                        markersLayer.addLayer(marker);
                        bounds.push([lat, lon]);
                    }
                }
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
            }
        }

        // Escucha de cambios
        areaSelect.addEventListener('change', (e) => mostrarMarcadores(e.target.value));

        // Inicio
        cargarDatos();
    </script>
</body>
</html>
