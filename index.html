<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="/Logo.png">
    <link rel="apple-touch-icon" href="/Logo.png"> 
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/all.min.css">
    <script>
        if (window.location.hostname.includes("pages.dev")) {
            window.location.replace("https://psqaldia.com" + window.location.pathname + window.location.search);
        }
    </script>
    <meta name="google-site-verification" content="BpHCi544mGO8TaOecGzGZpkH4wzaltHrdY4VqNhBEp4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSQALDÍA | Tu web/app para la psiquiatría clínica</title>
    <meta name="description" content="Plataforma con recursos actualizados para la psiquiatría clínica. Recopilación de materiales y creación de herramientas útiles para el día a día.">
    <meta name="theme-color" content="#4338ca">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --primary: #4338ca; --whatsapp: #22c55e;
            --text-main: #1e293b; --text-muted: #64748b; --fav: #f59e0b; --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --card: #1e293b; --primary: #818cf8;
                --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155;
            }
        }
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; padding: 0; transition: background 0.3s; 
        }

        header { background: var(--bg); padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 100; transition: transform 0.4s ease; display: flex; align-items: center; justify-content: space-between; }
        header.hide { transform: translateY(-100%); }
        .menu-toggle { background: none; border: none; color: var(--text-main); font-size: 1.4rem; cursor: pointer; padding: 0.5rem; z-index: 110; width: 40px; display: flex; align-items: center; justify-content: center; }
        .logo-img { max-height: 80px; width: auto; display: block; margin: 0 auto; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* VISOR PRINCIPAL: Blindado a 1 columna en móvil */
        #app, #favs-app { 
            display: grid !important; 
            grid-template-columns: 1fr !important; 
            gap: 1.5rem !important; 
            width: 100% !important;
            max-width: 500px !important; /* Evita que las tarjetas se estiren demasiado hacia los lados */
            margin: 0 auto !important;
        }

        /* DISEÑO MOSAICO: Solo para pantallas grandes */
        @media (min-width: 768px) {
            #app, #favs-app {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
                max-width: 1100px !important;
                gap: 2rem !important;
            }
        }

        /* TARJETAS: Forzamos verticalidad */
        .card { 
            background: var(--card); border-radius: 1.5rem; overflow: hidden; border: 1px solid var(--border); 
            transition: 0.3s; cursor: pointer; display: flex !important; flex-direction: column !important; 
            position: relative; width: 100% !important;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: var(--border); }
        .card-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }

        /* MODALES: Corregido el efecto apaisado */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal-content { 
            background: var(--card); color: var(--text-main); width: 100% !important; 
            max-width: 450px !important; /* Tamaño vertical de tarjeta móvil */
            border-radius: 2rem; position: relative; overflow-y: auto; max-height: 90vh; 
            display: flex !important; flex-direction: column !important;
        }

        /* Estilos de apoyo (Menu, Botones, etc) */
        .side-menu { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--card); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 10px 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .side-menu.open { left: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 1999; display: none; }
        .menu-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .menu-link { padding: 1rem 1.5rem; display: flex; align-items: center; gap: 15px; text-decoration: none; color: var(--text-main); font-weight: 700; border-left: 4px solid transparent; }
        .container { max-width: 1100px; margin: 0 auto 3rem; padding: 0 1rem; }
        #search { width: 100%; padding: 1.1rem 1.5rem; border-radius: 50px; border: 2px solid var(--border); background: var(--card); color: var(--text-main); margin-bottom: 1.5rem; }
        .f-btn { padding: 0.6rem 1.2rem; border-radius: 50px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); }
        .f-btn.active { background: var(--text-main); color: var(--bg); }
        .tag { padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.7rem; font-weight: 800; margin-bottom: 1rem; width: fit-content; text-transform: uppercase; }
        .tit { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.7rem; color: var(--text-main); }
        .btn { flex: 1; padding: 0.8rem; border-radius: 1rem; text-decoration: none; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-share { background: #64748b; color: white; flex: 0 0 55px; }
        footer { margin-top: 5rem; padding: 3rem 1rem; border-top: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>
<header id="mainHeader">
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir Menú"><i class="fas fa-bars"></i></button>
    <img src="Logo.png" alt="Logo PSQALDÍA" class="logo-img">
    <div class="header-spacer"></div>
</header>
<div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
<div id="sideMenu" class="side-menu">
    <div class="menu-header">
        <span style="font-weight: 900; color: var(--primary); letter-spacing: 1px;">PSQALDÍA</span>
        <button class="menu-toggle" onclick="toggleMenu()" aria-label="Cerrar Menú"><i class="fas fa-times"></i></button>
    </div>
    <nav class="menu-nav">
        <a href="#" class="menu-link" onclick="toggleMenu(); window.scrollTo({top: 0, behavior: 'smooth'});"><i class="fas fa-home"></i> Inicio</a>
        <a href="/herramientas" class="menu-link"><i class="fas fa-toolbox"></i> Herramientas</a>
        <a href="/opesergas" class="menu-link"><i class="fas fa-graduation-cap"></i> Portal OPE</a>
        <a href="https://forms.gle/ugCJGaTksJ4g5eUr7" target="_blank" class="menu-link"><i class="fas fa-lightbulb"></i> Sugiere contenidos</a>
        <a href="#" class="menu-link" onclick="openSettings()"><i class="fas fa-cog"></i> Ajustes</a>
        <a href="#" class="menu-link" onclick="openAbout()"><i class="fas fa-info-circle"></i> Sobre el proyecto</a>
    </nav>
</div>
<div class="container">
    <div class="search-area">
        <input type="text" id="search" placeholder="Buscar..." oninput="filter()">
        <div id="filterContainer" class="filter-buttons" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:1rem;"></div>
    </div>
    <div id="favs-title" class="section-title" style="font-size:0.9rem; font-weight:800; color:var(--text-muted); margin:2rem 0 1rem; text-transform:uppercase; display:none;"><i class="fas fa-star"></i> Mis Favoritos</div>
    <div id="favs-app"></div>
    <div id="main-title" class="section-title" style="font-size:0.9rem; font-weight:800; color:var(--text-muted); margin:2rem 0 1rem; text-transform:uppercase; display:none;">Todos los Recursos</div>
    <div id="app"></div>
</div>
<footer>
    <div style="margin-bottom: 1rem; font-weight: 800; opacity: 0.5; font-size: 0.8rem; letter-spacing: 1px;">PSQALDÍA © 2026</div>
    <a href="#" onclick="openLegal(); return false;" style="color: var(--text-muted); font-size: 0.7rem; text-decoration: underline;">Ver Aviso Legal y Responsabilidad</a>
</footer>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-modal" onclick="closeModal()" style="position:absolute; top:1rem; right:1rem; cursor:pointer; z-index:20; background:var(--card); border-radius:50%; width:2.5rem; height:2.5rem; display:flex; align-items:center; justify-content:center; border:1px solid var(--border);"><i class="fas fa-times"></i></div>
        <div id="modalData"></div>
    </div>
</div>

<script>
    /* Lógica original de PSQALDÍA - NO SE MUEVE NI UNA COMA */
    let db = [], favorites = JSON.parse(localStorage.getItem('psq_favs') || '[]'), currentCategory = 'TODOS', lastScrollY = window.scrollY;

    function slugify(text) {
        return text.toString().toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
    }

    async function loadData() {
        try {
            const res = await fetch(`/?sheet=${encodeURIComponent('Hoja 1')}`);
            const data = await res.json();
            if (data.values) {
                db = data.values.map(row => ({ 
                    fecha: row[0]||'', titulo: row[1]||'', resumen: row[2]||'', link: row[3]||'', imagen: row[4]||'',
                    categoria: (row[5]||'Otros').trim().toUpperCase(), accion: row[6]||'', 
                    script: row[8]||'', id: slugify(row[1] || 'item') 
                }));
            }
            db.sort((a, b) => {
                const dateA = a.fecha.split('/').reverse().join('');
                const dateB = b.fecha.split('/').reverse().join('');
                return dateB.localeCompare(dateA);
            });
            createFilterButtons(); renderAll(); checkSharedResource();
        } catch (e) { console.error("Error:", e); }
    }

    function createCard(item) {
        const isFav = favorites.includes(item.id);
        const card = document.createElement('div'); card.className = 'card';
        card.onclick = () => { window.history.pushState({}, '', `/${item.id}`); openModal(item.id); };
        card.innerHTML = `<button class="fav-btn ${isFav?'is-fav':''}" style="position:absolute; top:1rem; right:1rem; background:var(--card); border:none; width:35px; height:35px; border-radius:50%; cursor:pointer; color:${isFav?'var(--fav)':'#cbd5e1'}; z-index:10;" onclick="toggleFavorite(event,'${item.id}')"><i class="fa${isFav?'s':'r'} fa-star"></i></button>
            <img src="${item.imagen || 'https://via.placeholder.com/400x200?text=PSQ'}" class="card-img">
            <div class="card-content">
                <span class="tag" style="background:#eee; color:#333; ${getPasteColor(item.categoria)}">${item.categoria}</span>
                <div class="tit">${item.titulo}</div>
                <div class="card-date" style="font-size:0.7rem; color:var(--text-muted); margin-bottom:1rem;"><i class="far fa-calendar-alt"></i> ${item.fecha}</div>
                <div class="card-actions" style="display:flex; gap:0.75rem; margin-top:auto;">
                    <button class="btn btn-primary">ACCEDER</button>
                    <button class="btn btn-share" onclick="compartirRecurso(event, '${item.id}')"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
            </div>`;
        return card;
    }

    function openModal(id) {
        const item = db.find(i => i.id === id); if (!item) return;
        let accessBtn = `<a href="${item.link}" target="_blank" class="btn btn-primary">ACCEDER</a>`;
        if (item.accion && item.accion !== '') accessBtn = `<button class="btn btn-primary" onclick="ejecutarAccion('${item.id}')">ACCEDER</button>`;
        document.getElementById('modalData').innerHTML = `
            <img src="${item.imagen || 'https://via.placeholder.com/400x200?text=PSQ'}" style="width:100%; height:250px; object-fit:cover;">
            <div style="padding:2rem;">
                <span class="tag" style="${getPasteColor(item.categoria)}">${item.categoria}</span>
                <h2 style="margin:1rem 0;">${item.titulo}</h2>
                <p style="line-height:1.6;">${item.resumen}</p>
                <div class="card-actions" style="display:flex; gap:10px; margin-top:20px;">
                    ${accessBtn}
                    <button class="btn btn-share" style="flex:0 0 60px;" onclick="compartirRecurso(event, '${item.id}')"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
            </div>`;
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    async function ejecutarAccion(id) {
        const item = db.find(i => i.id === id); if (!item) return;
        if (item.script) {
            const s = document.createElement('script'); s.src = item.script;
            document.head.appendChild(s);
            s.onload = () => { if(window[item.accion]) window[item.accion](); };
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; window.history.pushState({}, '', '/'); }
    function toggleFavorite(e, id) { e.stopPropagation(); favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id]; localStorage.setItem('psq_favs', JSON.stringify(favorites)); filter(); }
    function filter() { const q = document.getElementById('search').value.toLowerCase(); const filtered = db.filter(i => (i.titulo.toLowerCase().includes(q) || i.resumen.toLowerCase().includes(q)) && (currentCategory === 'TODOS' || i.categoria === currentCategory)); renderAll(filtered); }
    
    function renderAll(dataToRender = db) {
        const favsApp = document.getElementById('favs-app'), app = document.getElementById('app');
        const favsList = dataToRender.filter(i => favorites.includes(i.id)), othersList = dataToRender.filter(i => !favorites.includes(i.id));
        favsApp.innerHTML = ''; app.innerHTML = '';
        if (favsList.length > 0 && currentCategory === 'TODOS') { document.getElementById('favs-title').style.display = 'block'; favsList.forEach(i => favsApp.appendChild(createCard(i))); }
        else { document.getElementById('favs-title').style.display = 'none'; }
        document.getElementById('main-title').style.display = (favsList.length > 0) ? 'block' : 'none';
        othersList.forEach(i => app.appendChild(createCard(i)));
    }

    function createFilterButtons() {
        const container = document.getElementById('filterContainer'), cats = ['TODOS', ...new Set(db.map(i => i.categoria))];
        cats.forEach(cat => {
            const btn = document.createElement('button'); btn.className = `f-btn ${cat === currentCategory ? 'active' : ''}`; btn.textContent = cat;
            btn.onclick = () => { currentCategory = cat; document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filter(); };
            container.appendChild(btn);
        });
    }

    function getPasteColor(str) {
        let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const h = Math.abs(hash) % 360; return `background-color: hsl(${h}, 70%, 90%); color: hsl(${h}, 70%, 20%);`;
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('menuOverlay').style.display = document.getElementById('sideMenu').classList.contains('open') ? 'block' : 'none'; }
    async function compartirRecurso(e, id) { e.stopPropagation(); const item = db.find(i => i.id === id); if (navigator.share) navigator.share({ title: item.titulo, url: window.location.origin + '/' + item.id }); }
    function checkSharedResource() { const path = window.location.pathname.substring(1); if (path) { setTimeout(() => openModal(path), 500); } }

    loadData();
</script>
</body>
</html>
