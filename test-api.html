<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico PSQALDÍA | Test Directo</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 2rem; background: #f8fafc; color: #1e293b; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #4338ca; }
        .status { padding: 1rem; border-radius: 0.5rem; font-weight: bold; margin: 1rem 0; }
        .loading { background: #fef3c7; color: #92400e; }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
        pre { background: #f1f5f9; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 Diagnóstico de Conexión</h1>
        <p>Este test intenta conectar <strong>directamente</strong> desde este PC a Google Sheets, saltándose tu Worker de Cloudflare.</p>
        
        <div id="status" class="status loading">⏳ Conectando con Google APIs...</div>
        
        <div id="details"></div>
    </div>

    <script>
        const startTime = Date.now();

        // ==========================================
        // 🛠️ CONFIGURA TUS DATOS AQUÍ ABAJO
        // ==========================================
        const SHEET_ID = "TU_GOOGLE_SHEET_ID_AQUÍ";
        const API_KEY = "TU_GOOGLE_API_KEY_AQUÍ";
        const HOJA = "Hoja 1"; 
        // ==========================================

        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/'${encodeURIComponent(HOJA)}'!A1:B2?key=${API_KEY}`;

        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error(`Error de red: ${res.status} ${res.statusText}`);
                return res.json();
            })
            .then(data => {
                const duration = (Date.now() - startTime) / 1000;
                const statusEl = document.getElementById('status');
                statusEl.className = "status success";
                statusEl.innerHTML = `✅ ¡CONEXIÓN EXITOSA! (${duration}s)`;
                
                document.getElementById('details').innerHTML = `
                    <p>Google respondió rápido. Esto significa que el hospital <strong>NO</strong> bloquea a Google.</p>
                    <p>Primeros datos recibidos:</p>
                    <pre>${JSON.stringify(data.values, null, 2)}</pre>
                `;
            })
            .catch(err => {
                const statusEl = document.getElementById('status');
                statusEl.className = "status error";
                statusEl.innerHTML = `❌ FALLO DE CONEXIÓN`;
                
                document.getElementById('details').innerHTML = `
                    <p>El navegador no pudo llegar a Google Sheets. Error: <code>${err.message}</code></p>
                    <p>Esto confirma que el firewall del hospital bloquea las peticiones externas a APIs.</p>
                `;
            });
    </script>
</body>
</html>
