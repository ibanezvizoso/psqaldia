<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulación de FAE | PSQALDÍA</title>
    <meta name="description" content="Planificador dinámico de inicio de fármacos antiepilépticos basado en guías clínicas.">
    <link rel="icon" type="image/png" href="/Logo.png">
    <link rel="stylesheet" href="/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg: #fcfdfe;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #f1f5f9;
            --radius: 1.5rem;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0;
            display: flex; flex-direction: column; min-height: 100vh; -webkit-font-smoothing: antialiased;
        }
        .nav-header { padding: 1.5rem 2rem; max-width: 1000px; margin: auto; width: 100%; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .hero { text-align: center; padding: 4rem 1.5rem 3rem; background: radial-gradient(circle at top, var(--primary-light) 0%, transparent 70%); }
        .hero h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem; margin-top: 0; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: auto; }
        .container { max-width: 1000px; margin: auto; padding: 0 1.5rem 5rem; flex: 1; width: 100%; box-sizing: border-box; }
        
        /* El contenedor donde el JS inyectará todo */
        #modalData { 
            background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); overflow: hidden; min-height: 400px;
        }

        .nav-footer { margin-top: 4rem; text-align: center; padding: 2rem; border-top: 1px solid var(--border); }
        .link-back { color: var(--primary); font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; text-transform: uppercase; }
        .site-bottom-info { text-align: center; padding: 2rem 1rem; background: #f8fafc; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border); }
        .site-bottom-info img { height: 18px; vertical-align: middle; margin-right: 8px; opacity: 0.4; filter: grayscale(100%); }
    </style>
</head>
<body>
    <nav class="nav-header">
        <a href="/" class="logo"><i class="fas fa-brain"></i> PSQALDÍA</a>
    </nav>
    <header class="hero">
        <h1>Titulación de FAE</h1>
        <p>Planificador dinámico para el inicio de fármacos antiepilépticos.</p>
    </header>
    <main class="container">
        <div id="modalData">
            <div style="padding:5rem; text-align:center;">
                <i class="fas fa-sync fa-spin fa-2x" style="color:var(--primary);"></i>
                <p style="margin-top:1rem; font-weight:700; color:var(--text-muted);">Cargando motor de titulación...</p>
            </div>
        </div>
        <footer class="nav-footer">
            <a href="/herramientas" class="link-back"><i class="fas fa-arrow-left"></i> VOLVER A HERRAMIENTAS</a>
        </footer>
    </main>
    <footer class="site-bottom-info">
        <img src="/Logo.png" alt="PSQ AL DÍA"> <span>&copy; 2026 PSQ AL DÍA - Herramientas clínicas</span>
    </footer>

    <script src="/aes.js"></script>
    <script>
        // Esto es lo que permite que funcione tanto por URL directa como por el botón Acceder
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.iniciarAES === 'function') { window.iniciarAES(); }
        });
    </script>
</body>
</html>
